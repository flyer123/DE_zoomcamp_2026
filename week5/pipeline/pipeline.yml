name: nyc_taxi
schedule: daily
start_date: "2022-01-01"

default_connections:
  duckdb: duckdb-default

assets:
  - name: ingestion.payment_lookup

  - name: ingestion.trips
    depends_on:
      - ingestion.payment_lookup

  - name: staging.trips
    depends_on:
      - ingestion.trips

  - name: reports.trips_report
    depends_on:
      - staging.trips

variables:
  taxi_types:
    type: array
    items:
      type: string
    default: ["yellow"]