version: "3.9"

services:
  bruin:
    build: .
    container_name: bruin-nyc
    working_dir: /app
    volumes:
      - ./:/app
      - duckdb_data:/app
    tty: true
    entrypoint: >
      bash -c "
        pip install --no-cache-dir bruin pandas requests pyarrow python-dateutil &&
        tail -f /dev/null
      "

volumes:
  duckdb_data: